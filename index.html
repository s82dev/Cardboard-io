<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardboard City</title>

<style>
body { margin:0; overflow:hidden; background:#eaeef3; }
canvas { display:block; }

#menu{
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  background:white; z-index:10;
}

button{
  font-size:20px;
  padding:15px 30px;
  border:none;
  border-radius:20px;
  background:#00d7c9;
  color:white;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Cardboard City</h1>
  <button onclick="start()">PLAY</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
onresize = resize;

const SIZE = 120;
const grid = Array.from({length:SIZE},()=>Array(SIZE).fill(null));
const trail = Array.from({length:SIZE},()=>Array(SIZE).fill(null));

const COLORS = ["#00d7c9","#ff5b5b","#ffaa00","#a855f7"];

let player, bots=[];

function make(id,x,y){
  return {id,x,y,dir:0,trail:[],color:COLORS[id]};
}

function init(){
  player = make(0,60,60);
  bots = [make(1,10,10),make(2,110,10),make(3,10,110)];

  [...bots,player].forEach(e=>{
    for(let dx=-1;dx<=1;dx++)
      for(let dy=-1;dy<=1;dy++)
        grid[e.y+dy][e.x+dx]=e.id;
  });
}

// TOUCH SWIPE
let dir=0;
let sx=0,sy=0;

addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

addEventListener("touchmove",e=>{
  let dx=e.touches[0].clientX-sx;
  let dy=e.touches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) dir=0;
    if(dx<-20) dir=2;
  } else {
    if(dy>20) dir=1;
    if(dy<-20) dir=3;
  }
});

// MOVE
function move(e){
  if(e===player && Math.abs(dir-e.dir)!==2) e.dir=dir;

  if(e.dir==0) e.x++;
  if(e.dir==1) e.y++;
  if(e.dir==2) e.x--;
  if(e.dir==3) e.y--;

  e.x=Math.max(0,Math.min(SIZE-1,e.x));
  e.y=Math.max(0,Math.min(SIZE-1,e.y));

  if(trail[e.y][e.x]!=null){
    respawn(e);
    return;
  }

  if(grid[e.y][e.x]!==e.id){
    trail[e.y][e.x]=e.id;
    e.trail.push([e.x,e.y]);
  } else if(e.trail.length){
    e.trail.forEach(p=>{
      grid[p[1]][p[0]]=e.id;
      trail[p[1]][p[0]]=null;
    });
    e.trail=[];
  }
}

function respawn(e){
  e.x=Math.random()*SIZE|0;
  e.y=Math.random()*SIZE|0;
  e.trail.forEach(p=>trail[p[1]][p[0]]=null);
  e.trail=[];
}

// BOT
function bot(e){
  if(Math.random()<0.1){
    e.dir=Math.random()*4|0;
  }
}

// DRAW (CITY STYLE + ZOOM OUT)
function draw(){
  ctx.fillStyle="#eaeef3";
  ctx.fillRect(0,0,c.width,c.height);

  let cell = 8; // 🔥 kleiner = weiter raus = großer POV

  let camX=player.x;
  let camY=player.y;

  function s(x,y){
    return [
      (x-camX)*cell + c.width/2,
      (y-camY)*cell + c.height/2
    ];
  }

  // TERRITORY (wie Blocks / Stadt)
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      let id=grid[y][x];
      if(id!=null){
        let [sx,sy]=s(x,y);

        ctx.fillStyle=COLORS[id];
        ctx.fillRect(sx,sy,cell,cell);

        // 3D look
        ctx.fillStyle="rgba(0,0,0,0.2)";
        ctx.fillRect(sx,sy+cell-2,cell,2);
      }
    }
  }

  // TRAILS (Straßen Style)
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      let id=trail[y][x];
      if(id!=null){
        let [sx,sy]=s(x,y);
        ctx.fillStyle=COLORS[id];
        ctx.fillRect(sx,sy,cell,cell);
      }
    }
  }

  // PLAYER + BOTS
  [player,...bots].forEach(e=>{
    let [sx,sy]=s(e.x,e.y);

    ctx.fillStyle=e.color;
    ctx.fillRect(sx,sy,cell,cell);

    ctx.strokeStyle="white";
    ctx.strokeRect(sx,sy,cell,cell);
  });
}

// LOOP
function loop(){
  move(player);
  bots.forEach(b=>{bot(b); move(b);});
  draw();
  requestAnimationFrame(loop);
}

// START
function start(){
  document.getElementById("menu").style.display="none";
  init();
  loop();
}
</script>

</body>
</html>
